<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      color: #1e293b;
      text-align: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      padding: 48px 40px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12);
      max-width: 560px;
      width: 100%;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      margin-bottom: 16px;
      letter-spacing: -0.04em;
    }

    p {
      font-size: 1.15rem;
      color: #475569;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      margin-bottom: 24px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #e0f2fe;
      color: #0369a1;
      font-weight: 700;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Coming Soon</div>
    <h1>Web Page Coming</h1>
    <p>This site is being prepared. Please check back soon.</p>
  </main>
</body>
</html>
