# Render Blueprint — lets Render auto-provision and auto-run this app
# straight from the GitHub repo. See:
# https://render.com/docs/blueprint-spec
#
# Deploy: push this repo to GitHub, then either
#   (a) click the "Deploy to Render" button in README.md, or
#   (b) in the Render dashboard: New -> Blueprint -> pick this repo.
# Render reads this file, runs `npm install` then `npm start` automatically,
# and re-runs both on every push to your default branch.

services:
  - type: web
    name: aws-agentic-ai-security-checklist
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      # Auto-generated by Render at deploy time — keeps login sessions valid
      # across restarts without you having to create/paste a secret yourself.
      - key: JWT_SECRET
        generateValue: true
      # Left blank on purpose (sync: false = "set this in the Render
      # dashboard, don't put it in the repo"). Fill these in under your
      # service's Environment tab, or use the in-app "Email settings" panel
      # after logging in — see the persistence caveat in README.md.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

    # --- Persistent storage for the SQLite database ---------------------
    # IMPORTANT: Render's free web service plan has an EPHEMERAL filesystem
    # — it wipes data/app.db (all users, roles, checklist state) every time
    # the service redeploys or spins back up after going idle (free
    # services sleep after ~15 min of inactivity). Fine for testing the
    # deploy itself; not fine for real use.
    #
    # To make data durable, upgrade this service to a paid instance type
    # and uncomment the block below to attach a real persistent disk:
    #
    # disk:
    #   name: checklist-data
    #   mountPath: /opt/render/project/src/data
    #   sizeGB: 1
    #
    # Alternative: swap the SQLite file for Render's free managed Postgres
    # (a separate always-on data service, unaffected by the web service's
    # ephemeral disk). Ask if you'd like this app ported to that.
